ription\":\"Textile print showing hands with tarot cards and keys against a red background.\",\"media\":{\"id\":\"tm-media-03\",\"url\":\"https://hebbkx1anhila5yf.public.blob.vercel-storage.com/transversivemedia_03-itixc1055cFRCznqDNqesnyemRMJLz.png\",\"type\":\"image\",\"alt\":\"Digital Alchemy 03\"},\"year\":\"2023\",\"category\":\"Digital Alchemy\",\"details\":{\"Medium\":\"Digital print on fabric\",\"Dimensions\":\"20 × 16 inches\"},\"createdAt\":\"2023-01-03T00:00:00.000Z\",\"updatedAt\":\"2023-01-03T00:00:00.000Z\"},{\"id\":\"tm-04\",\"title\":\"Digital Alchemy 04\",\"slug\":\"transversive-media-04\",\"description\":\"Textile print showing a close-up portrait with dice and snake elements.\",\"media\":{\"id\":\"tm-media-04\",\"url\":\"https://hebbkx1anhila5yf.public.blob.vercel-storage.com/transversivemedia_04-w0Y9Mca4xJ1kGi33nkaUEQefPT3aBi.png\",\"type\":\"image\",\"alt\":\"Digital Alchemy 04\"},\"year\":\"2023\",\"category\":\"Digital Alchemy\",\"details\":{\"Medium\":\"Digital print on fabric\",\"Dimensions\":\"24 × 12 inches\"},\"createdAt\":\"2023-01-04T00:00:00.000Z\",\"updatedAt\":\"2023-01-04T00:00:00.000Z\"},{\"id\":\"tm-05\",\"title\":\"Digital Alchemy 05\",\"slug\":\"transversive-media-05\",\"description\":\"Textile print with abstract body forms in soft pink and white tones.\",\"media\":{\"id\":\"tm-media-05\",\"url\":\"https://hebbkx1anhila5yf.public.blob.vercel-storage.com/transversivemedia_05-zvOyYye5JuRAJfsSdlapMfTgifT02s.png\",\"type\":\"image\",\"alt\":\"Digital Alchemy 05\"},\"year\":\"2023\",\"category\":\"Digital Alchemy\",\"details\":{\"Medium\":\"Digital print on fabric\",\"Dimensions\":\"18 × 18 inches\"},\"createdAt\":\"2023-01-05T00:00:00.000Z\",\"updatedAt\":\"2023-01-05T00:00:00.000Z\"},{\"id\":\"tm-06\",\"title\":\"Digital Alchemy 06\",\"slug\":\"transversive-media-06\",\"description\":\"Textile print showing a figure with red hair in blue clothing overlaid with green plant elements.\",\"media\":{\"id\":\"tm-media-06\",\"url\":\"https://hebbkx1anhila5yf.public.blob.vercel-storage.com/transversivemedia_06-tQ562maU2LYxgS9YPven1QIBpOzU46.png\",\"type\":\"image\",\"alt\":\"Digital Alchemy 06\"},\"year\":\"2023\",\"category\":\"Digital Alchemy\",\"details\":{\"Medium\":\"Digital print on fabric\",\"Dimensions\":\"24 × 14 inches\"},\"createdAt\":\"2023-01-06T00:00:00.000Z\",\"updatedAt\":\"2023-01-06T00:00:00.000Z\"},{\"id\":\"tm-07\",\"title\":\"Digital Alchemy 07\",\"slug\":\"transversive-media-07\",\"description\":\"Vertical textile print showing a distorted landscape with reddish figures.\",\"media\":{\"id\":\"tm-media-07\",\"url\":\"https://hebbkx1anhila5yf.public.blob.vercel-storage.com/transversivemedia_07-zpPGGDiiBNaJkpt0wqxytlic8LUmRR.png\",\"type\":\"image\",\"alt\":\"Digital Alchemy 07\"},\"year\":\"2023\",\"category\":\"Digital Alchemy\",\"details\":{\"Medium\":\"Digital print on fabric\",\"Dimensions\":\"36 × 12 inches\"},\"createdAt\":\"2023-01-07T00:00:00.000Z\",\"updatedAt\":\"2023-01-07T00:00:00.000Z\"},{\"id\":\"tm-08\",\"title\":\"Digital Alchemy 08\",\"slug\":\"transversive-media-08\",\"description\":\"Mesh fabric installation capturing various objects including a yellow tarot card and art supplies, creating layers of transparency and meaning.\",\"media\":{\"id\":\"tm-media-08\",\"url\":\"https://hebbkx1anhila5yf.public.blob.vercel-storage.com/transversivemedia_26-127ivYJvc5uZYIuHFE4l2ejROkKKgR.png\",\"type\":\"image\",\"alt\":\"Digital Alchemy 08\"},\"year\":\"2023\",\"category\":\"Digital Alchemy\",\"details\":{\"Medium\":\"Mixed media on mesh fabric\",\"Dimensions\":\"24 × 18 inches\"},\"createdAt\":\"2023-01-08T00:00:00.000Z\",\"updatedAt\":\"2023-01-08T00:00:00.000Z\"},{\"id\":\"tm-09\",\"title\":\"Digital Alchemy 09\",\"slug\":\"transversive-media-09\",\"description\":\"Textile print with collaged text elements and red tones, featuring handwritten notes and printed fragments creating a layered narrative.\",\"media\":{\"id\":\"tm-media-09\",\"url\":\"https://hebbkx1anhila5yf.public.blob.vercel-storage.com/transversivemedia_28-yUqETGtBop1gd87ydsAbJt98oigly4.png\",\"type\":\"image\",\"alt\":\"Digital Alchemy 09\"},\"year\":\"2023\",\"category\":\"Digital Alchemy\",\"details\":{\"Medium\":\"Digital print on fabric with mixed media\",\"Dimensions\":\"18 × 12 inches\"},\"createdAt\":\"2023-01-09T00:00:00.000Z\",\"updatedAt\":\"2023-01-09T00:00:00.000Z\"},{\"id\":\"tm-10\",\"title\":\"Digital Alchemy 10\",\"slug\":\"transversive-media-10\",\"description\":\"Photographic transfer on wood panel featuring dual portraits with bokeh light effects, exploring identity and memory.\",\"media\":{\"id\":\"tm-media-10\",\"url\":\"https://hebbkx1anhila5yf.public.blob.vercel-storage.com/transversivemedia_27-pkTteNiZ2uF2C6vZneEzLfFgxT7HWw.png\",\"type\":\"image\",\"alt\":\"Digital Alchemy 10\"},\"year\":\"2023\",\"category\":\"Digital Alchemy\",\"details\":{\"Medium\":\"Photographic transfer on wood\",\"Dimensions\":\"16 × 20 inches\"},\"createdAt\":\"2023-01-10T00:00:00.000Z\",\"updatedAt\":\"2023-01-10T00:00:00.000Z\"},{\"id\":\"tm-11\",\"title\":\"Pharmaceutical Meditation\",\"slug\":\"pharmaceutical-meditation\",\"description\":\"A mixed media piece featuring orange and white pill capsules arranged in a circular pattern on a textured, dark surface with a soft pink border. The work explores themes of medication, consumption, and the intersection of health and art through the transformation of everyday pharmaceuticals into aesthetic objects.\",\"media\":{\"id\":\"tm-media-11\",\"url\":\"https://hebbkx1anhila5yf.public.blob.vercel-storage.com/transversivemedia_11-YLW3wRfzdDh77axUxr8WVebgCRnUMl.png\",\"type\":\"image\",\"alt\":\"Pharmaceutical Meditation\"},\"year\":\"2023\",\"category\":\"Digital Alchemy\",\"details\":{\"Medium\":\"Mixed media with pharmaceutical elements on panel\",\"Dimensions\":\"18 × 18 inches\"},\"createdAt\":\"2023-01-11T00:00:00.000Z\",\"updatedAt\":\"2023-01-11T00:00:00.000Z\"},{\"id\":\"tm-12\",\"title\":\"Fragmented Memory\",\"slug\":\"fragmented-memory\",\"description\":\"A layered mixed media work on wood panel featuring collaged photographic elements in muted tones of beige, orange, and red. The piece presents fragmented imagery that appears to be from vintage photographs or printed materials, creating a palimpsest of memory and time. The weathered surface and visible textures suggest the erosion and transformation of personal and collective histories.\",\"media\":{\"id\":\"tm-media-12\",\"url\":\"https://hebbkx1anhila5yf.public.blob.vercel-storage.com/transversivemedia_14-1yim3YQuZsy7Kyui8u8WvJmmamGfT9.png\",\"type\":\"image\",\"alt\":\"Fragmented Memory\"},\"year\":\"2023\",\"category\":\"Digital Alchemy\",\"details\":{\"Medium\":\"Mixed media collage on wood panel\",\"Dimensions\":\"20 × 20 inches\"},\"createdAt\":\"2023-01-12T00:00:00.000Z\",\"updatedAt\":\"2023-01-12T00:00:00.000Z\"},{\"id\":\"tm-13\",\"title\":\"Digital Artifact\",\"slug\":\"digital-artifact\",\"description\":\"A geometric abstraction on wood panel featuring a central red-orange form that appears both digital and organic in nature. The pixelated, glitch-like quality of the central element contrasts with the warm, natural tone of the wooden background, creating a dialogue between digital processes and traditional materials. The piece explores how digital information manifests in physical space.\",\"media\":{\"id\":\"tm-media-13\",\"url\":\"https://hebbkx1anhila5yf.public.blob.vercel-storage.com/transversivemedia_13-wlCm1uXDsG9hPf45q2kJ2GKn22GCvH.png\",\"type\":\"image\",\"alt\":\"Digital Artifact\"},\"year\":\"2023\",\"category\":\"Digital Alchemy\",\"details\":{\"Medium\":\"Digital transfer on wood panel\",\"Dimensions\":\"18 × 18 inches\"},\"createdAt\":\"2023-01-13T00:00:00.000Z\",\"updatedAt\":\"2023-01-13T00:00:00.000Z\"},{\"id\":\"tm-14\",\"title\":\"Translucent Archive\",\"slug\":\"translucent-archive\",\"description\":\"A vertical piece of translucent fabric with printed or transferred text and imagery visible through its semi-opaque surface. The bluish-gray material reveals fragments of text, barcodes, and other printed matter, creating layers of information that appear and disappear as light passes through the fabric. The frayed edges and visible mounting points emphasize the material's delicate nature and the ephemeral quality of the information it contains.\",\"media\":{\"id\":\"tm-media-14\",\"url\":\"https://hebbkx1anhila5yf.public.blob.vercel-storage.com/transversivemedia_18-LvgOHLU4fMJeXqe8M1isAZ7hkWxKkL.png\",\"type\":\"image\",\"alt\":\"Translucent Archive\"},\"year\":\"2023\",\"category\":\"Digital Alchemy\",\"details\":{\"Medium\":\"Digital transfer on translucent fabric\",\"Dimensions\":\"36 × 12 inches\"},\"createdAt\":\"2023-01-14T00:00:00.000Z\",\"updatedAt\":\"2023-01-14T00:00:00.000Z\"},{\"id\":\"tm-15\",\"title\":\"Ethereal Currents\",\"slug\":\"ethereal-currents\",\"description\":\"A translucent fabric artwork with vibrant red and teal elements against a silvery background. The piece features organic flowing lines and abstract forms that create a sense of movement across the delicate surface. The frayed edges and visible mounting points emphasize the material nature of the work, while the composition suggests a dialogue between structure and fluidity.\",\"media\":{\"id\":\"tm-media-15\",\"url\":\"https://hebbkx1anhila5yf.public.blob.vercel-storage.com/transversivemedia_37-1XxuBqgZ0iuPbVCFyR0qjGcnycJNAL.png\",\"type\":\"image\",\"alt\":\"Ethereal Currents\"},\"year\":\"2023\",\"category\":\"Digital Alchemy\",\"details\":{\"Medium\":\"Mixed media on translucent fabric\",\"Dimensions\":\"24 × 18 inches\"},\"createdAt\":\"2023-01-15T00:00:00.000Z\",\"updatedAt\":\"2023-01-15T00:00:00.000Z\"},{\"id\":\"tm-16\",\"title\":\"Memory Fragments\",\"slug\":\"memory-fragments\",\"description\":\"A sculptural textile installation featuring translucent mesh fabric arranged in an angular, three-dimensional form. The piece contains collaged photographic elements and printed materials visible through the mesh, creating layers of visual information that shift as the viewer moves around the work. This exploration of memory and documentation examines how information is filtered, fragmented, and reconstructed through both physical and mental processes.\",\"media\":{\"id\":\"tm-media-16\",\"url\":\"https://hebbkx1anhila5yf.public.blob.vercel-storage.com/transversivemedia_34-stGqXSh0qINZC1LKlHZSqAv0H5KUKs.png\",\"type\":\"image\",\"alt\":\"Memory Fragments\"},\"year\":\"2023\",\"category\":\"Digital Alchemy\",\"details\":{\"Medium\":\"Photographic transfer on mesh fabric\",\"Dimensions\":\"30 × 24 × 12 inches\"},\"createdAt\":\"2023-01-16T00:00:00.000Z\",\"updatedAt\":\"2023-01-16T00:00:00.000Z\"},{\"id\":\"tm-17\",\"title\":\"Mountain Portal\",\"slug\":\"mountain-portal\",\"description\":\"A vertical hanging textile piece featuring a photographic landscape printed on translucent fabric. The image depicts a serene mountain vista with architectural elements in the foreground, creating a window-like portal to another place and time. The gentle draping of the fabric and its translucent quality transform the photographic image into something more ethereal and dreamlike, blurring the boundary between documentation and imagination.\",\"media\":{\"id\":\"tm-media-17\",\"url\":\"https://hebbkx1anhila5yf.public.blob.vercel-storage.com/transversivemedia_24-hneuWHj7DjG8cYKKon0eoEA00KAfqy.png\",\"type\":\"image\",\"alt\":\"Mountain Portal\"},\"year\":\"2023\",\"category\":\"Digital Alchemy\",\"details\":{\"Medium\":\"Photographic print on translucent fabric\",\"Dimensions\":\"48 × 24 inches\"},\"createdAt\":\"2023-01-17T00:00:00.000Z\",\"updatedAt\":\"2023-01-17T00:00:00.000Z\"},{\"id\":\"tm-18\",\"title\":\"Embodied Memory\",\"slug\":\"embodied-memory\",\"description\":\"A textile artwork printed on translucent fabric featuring a figure with vibrant red hair in blue clothing, overlaid with green plant elements. The piece explores the relationship between the human form and natural environment through layered imagery that creates a dreamlike, ethereal quality. The translucent material allows light to pass through, creating different viewing experiences as lighting conditions change.\",\"media\":{\"id\":\"tm-media-18\",\"url\":\"https://hebbkx1anhila5yf.public.blob.vercel-storage.com/transversivemedia_06-QioRxjtu07PmdcJ9G7Xs5FFoJxIQpm.png\",\"type\":\"image\",\"alt\":\"Embodied Memory\"},\"year\":\"2023\",\"category\":\"Digital Alchemy\",\"details\":{\"Medium\":\"Digital print on silk organza\",\"Dimensions\":\"36 × 24 inches\"},\"createdAt\":\"2023-01-18T00:00:00.000Z\",\"updatedAt\":\"2023-01-18T00:00:00.000Z\"},{\"id\":\"tm-19\",\"title\":\"Tactile Interface\",\"slug\":\"tactile-interface\",\"description\":\"A square mesh fabric installation featuring a photographic image of a hand reaching through a translucent surface. The piece explores themes of touch, boundary, and digital-physical interfaces through its material qualities and imagery. The white mesh fabric creates a screen-like effect that both reveals and obscures the image, inviting viewers to consider how we navigate between tangible and intangible realms.\",\"media\":{\"id\":\"tm-media-19\",\"url\":\"https://hebbkx1anhila5yf.public.blob.vercel-storage.com/transversivemedia_19-Do8tifMdXjkNitPcWuBuPDO71V1az4.png\",\"type\":\"image\",\"alt\":\"Tactile Interface\"},\"year\":\"2023\",\"category\":\"Digital Alchemy\",\"details\":{\"Medium\":\"Photographic print on mesh fabric\",\"Dimensions\":\"24 × 24 inches\"},\"createdAt\":\"2023-01-19T00:00:00.000Z\",\"updatedAt\":\"2023-01-19T00:00:00.000Z\"},{\"id\":\"tm-20\",\"title\":\"Signal Fragments\",\"slug\":\"signal-fragments\",\"description\":\"A vibrant textile artwork in rich crimson and black tones featuring geometric patterns and white graphic elements. The piece explores themes of communication, technology, and information through its visual language of circuit-like lines and abstract symbols. The draped fabric creates dimensional folds that transform the flat imagery into a sculptural form, suggesting the malleability of digital information as it moves through physical space.\",\"media\":{\"id\":\"tm-media-20\",\"url\":\"https://hebbkx1anhila5yf.public.blob.vercel-storage.com/transversivemedia_21-x24ncanJyL0x97Fy9xPSr53dVPkRZ0.png\",\"type\":\"image\",\"alt\":\"Signal Fragments\"},\"year\":\"2023\",\"category\":\"Digital Alchemy\",\"details\":{\"Medium\":\"Digital print on satin fabric\",\"Dimensions\":\"30 × 30 inches\"},\"createdAt\":\"2023-01-20T00:00:00.000Z\",\"updatedAt\":\"2023-01-20T00:00:00.000Z\"},{\"id\":\"char-01\",\"title\":\"Dice Gurl\",\"slug\":\"dice-gurl\",\"description\":\"Digital portrait featuring a figure with magenta hair in a satin outfit, adorned with a white dice and small snake element, exploring themes of chance and identity.\",\"media\":{\"id\":\"char-media-01\",\"url\":\"https://hebbkx1anhila5yf.public.blob.vercel-storage.com/character-dicegurl-01-74WS6zZijt9sAIbbFreCcTzAYlHfWL.png\",\"type\":\"image\",\"alt\":\"Dice Gurl\"},\"year\":\"2023\",\"category\":\"Characters\",\"details\":{\"Medium\":\"Digital art\",\"Dimensions\":\"2400 × 3200 px\"},\"createdAt\":\"2023-02-01T00:00:00.000Z\",\"updatedAt\":\"2023-02-01T00:00:00.000Z\"},{\"id\":\"char-02\",\"title\":\"Slices of Me\",\"slug\":\"slices-of-me\",\"description\":\"A study of movement and form through silhouettes, featuring repeated figures in motion against a textured landscape background.\",\"media\":{\"id\":\"char-media-02\",\"url\":\"https://hebbkx1anhila5yf.public.blob.vercel-storage.com/character-slicesofme-Wtsv1QTwuXAPHj3jiZU1HiiqwiwVt4.png\",\"type\":\"image\",\"alt\":\"Slices of Me\"},\"year\":\"2023\",\"category\":\"Characters\",\"details\":{\"Medium\":\"Digital art\",\"Dimensions\":\"1800 × 3600 px\"},\"createdAt\":\"2023-02-02T00:00:00.000Z\",\"updatedAt\":\"2023-02-02T00:00:00.000Z\"},{\"id\":\"char-03\",\"title\":\"Soul of AI\",\"slug\":\"soul-of-ai\",\"description\":\"Digital collage exploring the intersection of nature, technology, and artificial intelligence through layered imagery of animal skulls, code fragments, and digital artifacts.\",\"media\":{\"id\":\"char-media-03\",\"url\":\"https://hebbkx1anhila5yf.public.blob.vercel-storage.com/character-soulofai-hr9RrWqrAqS8f27cizHoHnWD1U9F7g.png\",\"type\":\"image\",\"alt\":\"Soul of AI\"},\"year\":\"2023\",\"category\":\"Characters\",\"details\":{\"Medium\":\"Digital collage\",\"Dimensions\":\"2400 × 3000 px\"},\"createdAt\":\"2023-02-03T00:00:00.000Z\",\"updatedAt\":\"2023-02-03T00:00:00.000Z\"},{\"id\":\"char-04\",\"title\":\"Crown Bearer\",\"slug\":\"crown-bearer\",\"description\":\"A striking portrait featuring a figure with vibrant orange hair wearing a metallic crown and dark armor. The character's pale complexion and intense gaze create a powerful presence, while the red pendant adds a touch of mystique to this medieval-inspired digital portrait.\",\"media\":{\"id\":\"char-media-04\",\"url\":\"https://hebbkx1anhila5yf.public.blob.vercel-storage.com/character-04-eAZb8Mcua9sy20Xx9xiKGkhZgQc1G9.png\",\"type\":\"image\",\"alt\":\"Crown Bearer\"},\"year\":\"2023\",\"category\":\"Characters\",\"details\":{\"Medium\":\"Digital art\",\"Dimensions\":\"2400 × 2400 px\"},\"createdAt\":\"2023-02-04T00:00:00.000Z\",\"updatedAt\":\"2023-02-04T00:00:00.000Z\"},{\"id\":\"char-05\",\"title\":\"Wooden Crown\",\"slug\":\"wooden-crown\",\"description\":\"A portrait transferred onto wood, where the natural grain becomes part of the composition. The figure wears a dark crown atop vibrant orange-red hair, creating a striking contrast against the warm tones of the wood. This piece explores the intersection of traditional portraiture and organic materials.\",\"media\":{\"id\":\"char-media-05\",\"url\":\"https://hebbkx1anhila5yf.public.blob.vercel-storage.com/character-05.png-PZQTTGovvhPJ39gAQxzej616kMRx7R.jpeg\",\"type\":\"image\",\"alt\":\"Wooden Crown\"},\"year\":\"2023\",\"category\":\"Characters\",\"details\":{\"Medium\":\"Photographic transfer on wood\",\"Dimensions\":\"18 × 24 inches\"},\"createdAt\":\"2023-02-05T00:00:00.000Z\",\"updatedAt\":\"2023-02-05T00:00:00.000Z\"},{\"id\":\"pos-01\",\"title\":\"Window Fronds\",\"slug\":\"window-fronds\",\"description\":\"A contemplative study of plant life viewed through architectural framing, exploring the relationship between interior and exterior spaces.\",\"media\":{\"id\":\"pos-media-01\",\"url\":\"https://hebbkx1anhila5yf.public.blob.vercel-storage.com/playonshape_03-aq99Lq5Y4RpeX7WQHIQbRizZJsOeIs.png\",\"type\":\"image\",\"alt\":\"Window Fronds\"},\"year\":\"2023\",\"category\":\"Play on Space\",\"details\":{\"Medium\":\"Photography\",\"Dimensions\":\"2400 × 2400 px\"},\"createdAt\":\"2023-03-01T00:00:00.000Z\",\"updatedAt\":\"2023-03-01T00:00:00.000Z\"},{\"id\":\"pos-02\",\"title\":\"Book Sequence\",\"slug\":\"book-sequence\",\"description\":\"A cinematic exploration of knowledge transmission through sequential frames showing hands interacting with geometric diagrams in a book.\",\"media\":{\"id\":\"pos-media-02\",\"url\":\"https://hebbkx1anhila5yf.public.blob.vercel-storage.com/playonshape_08-IPQg7ipJKXqSy8JGFbOf1TNYXAlRsl.png\",\"type\":\"image\",\"alt\":\"Book Sequence\"},\"year\":\"2023\",\"category\":\"Play on Space\",\"details\":{\"Medium\":\"Film photography\",\"Dimensions\":\"1600 × 2800 px\"},\"createdAt\":\"2023-03-02T00:00:00.000Z\",\"updatedAt\":\"2023-03-02T00:00:00.000Z\"},{\"id\":\"pos-03\",\"title\":\"Portrait Frames\",\"slug\":\"portrait-frames\",\"description\":\"A meditation on identity and time through sequential film frames of a face, creating a rhythmic visual experience that blurs the boundary between still and moving image.\",\"media\":{\"id\":\"pos-media-03\",\"url\":\"https://hebbkx1anhila5yf.public.blob.vercel-storage.com/playonshape_06-X8IrmmvjJkeK007dcJFK7FM2QrAT6v.png\",\"type\":\"image\",\"alt\":\"Portrait Frames\"},\"year\":\"2023\",\"category\":\"Play on Space\",\"details\":{\"Medium\":\"16mm film\",\"Dimensions\":\"1600 × 2800 px\"},\"createdAt\":\"2023-03-03T00:00:00.000Z\",\"updatedAt\":\"2023-03-03T00:00:00.000Z\"},{\"id\":\"pos-04\",\"title\":\"Vermillion Presence\",\"slug\":\"vermillion-presence\",\"description\":\"A bold exploration of absence and presence through a faceless, draped figure rendered in vivid red against a warm orange environment. The figure stands as a silent sentinel among palm trees and classical architectural elements, challenging perceptions of body, space, and identity through its striking monochromatic treatment and environmental juxtaposition.\",\"media\":{\"id\":\"pos-media-04\",\"url\":\"https://hebbkx1anhila5yf.public.blob.vercel-storage.com/playonspace-03-7YlWr7zWoxJ1DfRKxGH6goEUhQSIct.png\",\"type\":\"image\",\"alt\":\"Vermillion Presence\"},\"year\":\"2023\",\"category\":\"Play on Space\",\"details\":{\"Medium\":\"Digital photography with color manipulation\",\"Dimensions\":\"2000 × 3000 px\"},\"createdAt\":\"2023-03-04T00:00:00.000Z\",\"updatedAt\":\"2023-03-04T00:00:00.000Z\"},{\"id\":\"pos-05\",\"title\":\"Chromatic Flow\",\"slug\":\"chromatic-flow\",\"description\":\"A vibrant abstract composition featuring fluid, swirling patterns in orange, yellow, turquoise, and white. The piece captures a sense of dynamic movement through its organic forms and bold color transitions. The deckled edges of the paper add a tactile quality to this exploration of color interaction and visual rhythm, suggesting both natural phenomena like water currents and the more ephemeral flow of emotions or energy.\",\"media\":{\"id\":\"pos-media-05\",\"url\":\"https://hebbkx1anhila5yf.public.blob.vercel-storage.com/playonshape_18-X3rrZAiAY858IwKncGppNuDHVEZfh9.png\",\"type\":\"image\",\"alt\":\"Chromatic Flow\"},\"year\":\"2023\",\"category\":\"Play on Space\",\"details\":{\"Medium\":\"Fluid acrylic on handmade paper\",\"Dimensions\":\"18 × 24 inches\"},\"createdAt\":\"2023-03-05T00:00:00.000Z\",\"updatedAt\":\"2023-03-05T00:00:00.000Z\"},{\"id\":\"pos-06\",\"title\":\"Translucent Prisms\",\"slug\":\"translucent-prisms\",\"description\":\"A diptych photographic study of colorful translucent objects arranged against a white background. The vibrant orange, blue, purple, and amber forms create a play of light, color, and transparency as they overlap and interact. The composition explores how light passes through these geometric forms, creating new colors and shapes at their intersections. This piece invites contemplation of perception, materiality, and the transformative nature of light.\",\"media\":{\"id\":\"pos-media-06\",\"url\":\"https://hebbkx1anhila5yf.public.blob.vercel-storage.com/playonshape_12-mrt7B9qGy3gK36lzk9IxzcWYDEWVGH.png\",\"type\":\"image\",\"alt\":\"Translucent Prisms\"},\"year\":\"2023\",\"category\":\"Play on Space\",\"details\":{\"Medium\":\"Digital photography\",\"Dimensions\":\"24 × 36 inches\"},\"createdAt\":\"2023-03-06T00:00:00.000Z\",\"updatedAt\":\"2023-03-06T00:00:00.000Z\"},{\"id\":\"portal-01\",\"title\":\"Landscape Memory\",\"slug\":\"landscape-memory\",\"description\":\"A textural exploration of landscape through crumpled, dyed fabric. The piece creates a topographical memory of a path through green hills and blue sky, inviting viewers to traverse an imagined terrain.\",\"media\":{\"id\":\"portal-media-01\",\"url\":\"https://hebbkx1anhila5yf.public.blob.vercel-storage.com/portals-nobk-02-wEkA4CYIRqbEriClNPcwJx8UT6AdhR.png\",\"type\":\"image\",\"alt\":\"Landscape Memory\"},\"year\":\"2023\",\"category\":\"Portals\",\"details\":{\"Medium\":\"Dyed and manipulated fabric\",\"Dimensions\":\"36 × 48 inches\"},\"createdAt\":\"2023-04-01T00:00:00.000Z\",\"updatedAt\":\"2023-04-01T00:00:00.000Z\"},{\"id\":\"portal-02\",\"title\":\"Tactile Flow\",\"slug\":\"tactile-flow\",\"description\":\"A sculptural fabric piece exploring the materiality of memory. Subtle blue-green tones and organic textures create a sense of movement and flow, suggesting water or geological formations frozen in time.\",\"media\":{\"id\":\"portal-media-02\",\"url\":\"https://hebbkx1anhila5yf.public.blob.vercel-storage.com/portals-nobk-01-fJPkmohEVsSJPVcQ80WNmWTbGwxbzD.png\",\"type\":\"image\",\"alt\":\"Tactile Flow\"},\"year\":\"2023\",\"category\":\"Portals\",\"details\":{\"Medium\":\"Dyed fabric with mixed media\",\"Dimensions\":\"24 × 40 inches\"},\"createdAt\":\"2023-04-02T00:00:00.000Z\",\"updatedAt\":\"2023-04-02T00:00:00.000Z\"},{\"id\":\"portal-03\",\"title\":\"Forest Canopy\",\"slug\":\"forest-canopy\",\"description\":\"A translucent fabric piece capturing the experience of looking up through a forest canopy. The layered, crumpled surface creates depth and dimensionality, while the green tones evoke the filtered light of a dense forest.\",\"media\":{\"id\":\"portal-media-03\",\"url\":\"https://hebbkx1anhila5yf.public.blob.vercel-storage.com/portals-nobk-03-fHoJ3E9NbdgDA4ckeAujV8B7VbkYEg.png\",\"type\":\"image\",\"alt\":\"Forest Canopy\"},\"year\":\"2023\",\"category\":\"Portals\",\"details\":{\"Medium\":\"Silk with natural dyes\",\"Dimensions\":\"40 × 50 inches\"},\"createdAt\":\"2023-04-03T00:00:00.000Z\",\"updatedAt\":\"2023-04-03T00:00:00.000Z\"},{\"id\":\"portal-04\",\"title\":\"Oceanic Veil\",\"slug\":\"oceanic-veil\",\"description\":\"A suspended fabric piece that explores the boundary between air and water. The translucent material with its blue gradient creates a sense of submersion, while the folds and textures suggest currents and tides.\",\"media\":{\"id\":\"portal-media-04\",\"url\":\"https://hebbkx1anhila5yf.public.blob.vercel-storage.com/portals-nobk-05-lF1LZTsvObsnYz95QnzqMTNFM7DA4n.png\",\"type\":\"image\",\"alt\":\"Oceanic Veil\"},\"year\":\"2023\",\"category\":\"Portals\",\"details\":{\"Medium\":\"Hand-dyed silk organza\",\"Dimensions\":\"30 × 45 inches\"},\"createdAt\":\"2023-04-04T00:00:00.000Z\",\"updatedAt\":\"2023-04-04T00:00:00.000Z\"},{\"id\":\"portal-05\",\"title\":\"Horizon Lines\",\"slug\":\"horizon-lines\",\"description\":\"A textile piece that abstracts the experience of landscape into horizontal bands of color. The crumpled surface creates a sense of depth and movement, while the color palette evokes earth, water, and sky.\",\"media\":{\"id\":\"portal-media-05\",\"url\":\"https://hebbkx1anhila5yf.public.blob.vercel-storage.com/portals-nobk-06-wYJpkjFd5DbDlbgYUCCzmNeSGk2CJq.png\",\"type\":\"image\",\"alt\":\"Horizon Lines\"},\"year\":\"2023\",\"category\":\"Portals\",\"details\":{\"Medium\":\"Dyed and treated fabric\",\"Dimensions\":\"36 × 36 inches\"},\"createdAt\":\"2023-04-05T00:00:00.000Z\",\"updatedAt\":\"2023-04-05T00:00:00.000Z\"},{\"id\":\"portal-06\",\"title\":\"Memory Scan\",\"slug\":\"memory-scan\",\"description\":\"A vertical textile piece that resembles a digital scan or glitch of a landscape. The stretched and compressed imagery creates a sense of time passing, while the subtle color palette suggests a fading memory.\",\"media\":{\"id\":\"portal-media-06\",\"url\":\"https://hebbkx1anhila5yf.public.blob.vercel-storage.com/portals-nobk-09-8OFwDi6Ys12o8MZHICj5NHoDXDBcSG.png\",\"type\":\"image\",\"alt\":\"Memory Scan\"},\"year\":\"2023\",\"category\":\"Portals\",\"details\":{\"Medium\":\"Digital print on fabric\",\"Dimensions\":\"24 × 36 inches\"},\"createdAt\":\"2023-04-06T00:00:00.000Z\",\"updatedAt\":\"2023-04-06T00:00:00.000Z\"},{\"id\":\"portal-07\",\"title\":\"Desert Layers\",\"slug\":\"desert-layers\",\"description\":\"A digital exploration of dimensional space using a desert landscape as canvas. Multiple rectangular frames create a portal-like effect, inviting the viewer to step through layers of reality. The vibrant blue sky contrasts with the soft beige sand dunes and sparse vegetation, suggesting an oasis of possibility within the arid environment.\",\"media\":{\"id\":\"portal-media-07\",\"url\":\"https://hebbkx1anhila5yf.public.blob.vercel-storage.com/Portal-01-RTHEzaCLn0fxcQgtUTqTQEd7HRjvrT.png\",\"type\":\"image\",\"alt\":\"Desert Layers\"},\"year\":\"2023\",\"category\":\"Portals\",\"details\":{\"Medium\":\"Digital composition\",\"Dimensions\":\"2400 × 3200 px\"},\"createdAt\":\"2023-04-07T00:00:00.000Z\",\"updatedAt\":\"2023-04-07T00:00:00.000Z\"},{\"id\":\"portal-08\",\"title\":\"Mountain Echo\",\"slug\":\"mountain-echo\",\"description\":\"A dimensional study of a mountain landscape, where reality appears to fold in on itself through cascading rectangular frames. The golden-hued terrain and bright blue sky create a sense of expansiveness, while the layered composition suggests multiple parallel existences or the echoing of a single moment across time.\",\"media\":{\"id\":\"portal-media-08\",\"url\":\"https://hebbkx1anhila5yf.public.blob.vercel-storage.com/Portal-02-RXte0zViPp8ZW5wav65PdQZplRpY3Z.png\",\"type\":\"image\",\"alt\":\"Mountain Echo\"},\"year\":\"2023\",\"category\":\"Portals\",\"details\":{\"Medium\":\"Digital composition\",\"Dimensions\":\"2400 × 3200 px\"},\"createdAt\":\"2023-04-08T00:00:00.000Z\",\"updatedAt\":\"2023-04-08T00:00:00.000Z\"},{\"id\":\"portal-09\",\"title\":\"Crimson Terrain\",\"slug\":\"crimson-terrain\",\"description\":\"An otherworldly landscape rendered entirely in vivid red hues, featuring a geometric intervention in an undulating desert terrain. The rectangular form appears to both emerge from and sink into the environment, creating a portal-like disruption in the natural topography. This piece explores themes of artificial intrusion in natural spaces and the uncanny valley between digital and physical realms.\",\"media\":{\"id\":\"portal-media-09\",\"url\":\"https://hebbkx1anhila5yf.public.blob.vercel-storage.com/portal-05-LA3CvkBJaL5Qc76cK5uVTnUlChp0W6.png\",\"type\":\"image\",\"alt\":\"Crimson Terrain\"},\"year\":\"2023\",\"category\":\"Portals\",\"details\":{\"Medium\":\"Digital composition with color manipulation\",\"Dimensions\":\"2400 × 3600 px\"},\"createdAt\":\"2023-04-09T00:00:00.000Z\",\"updatedAt\":\"2023-04-09T00:00:00.000Z\"},{\"id\":\"portal-10\",\"title\":\"Shoreline Memory\",\"slug\":\"shoreline-memory\",\"description\":\"A delicate translucent fabric artwork capturing the essence of a coastal landscape. The crumpled, organic form creates a three-dimensional topography where the upper portion fades to ethereal white while the lower section reveals rich detail of vegetation, stones, and aquatic elements. This piece explores the fragility of environmental memory and the layered experience of natural spaces through its materiality and photographic transfer technique.\",\"media\":{\"id\":\"portal-media-10\",\"url\":\"https://hebbkx1anhila5yf.public.blob.vercel-storage.com/portals-nobk-07-3JxGwDR3q5auL6idzSBNpGizYflQs4.png\",\"type\":\"image\",\"alt\":\"Shoreline Memory\"},\"year\":\"2023\",\"category\":\"Portals\",\"details\":{\"Medium\":\"Photographic transfer on handmade paper\",\"Dimensions\":\"30 × 16 inches\"},\"createdAt\":\"2023-04-10T00:00:00.000Z\",\"updatedAt\":\"2023-04-10T00:00:00.000Z\"},{\"id\":\"portal-11\",\"title\":\"Wind Through Grass\",\"slug\":\"wind-through-grass\",\"description\":\"A textile artwork capturing the ephemeral quality of movement through a landscape. The diagonal streaks of green, yellow, and deep purple create a sense of motion, as if the viewer is passing through a field at speed or witnessing grass bending in a strong breeze. The intentional blurring technique transforms a static natural scene into a dynamic experience, exploring the intersection of time, movement, and perception.\",\"media\":{\"id\":\"portal-media-11\",\"url\":\"https://hebbkx1anhila5yf.public.blob.vercel-storage.com/portals-nobk-11-c6vjWvbMuKPQzW4qoS0d6XUMASicJ2.png\",\"type\":\"image\",\"alt\":\"Wind Through Grass\"},\"year\":\"2023\",\"category\":\"Portals\",\"details\":{\"Medium\":\"Dye on silk\",\"Dimensions\":\"24 × 16 inches\"},\"createdAt\":\"2023-04-11T00:00:00.000Z\",\"updatedAt\":\"2023-04-11T00:00:00.000Z\"},{\"id\":\"portal-12\",\"title\":\"Twilight Passages\",\"slug\":\"twilight-passages\",\"description\":\"A textile artwork with a deep indigo background illuminated by vertical columns of light. The glowing orange and yellow elements emerge from the darkness like doorways or passages to another dimension. The piece evokes the liminal space between day and night, or perhaps between different states of consciousness. The rich purple tones and luminous accents create a meditative, almost mystical atmosphere that invites contemplation of thresholds and transitions.\",\"media\":{\"id\":\"portal-media-12\",\"url\":\"https://hebbkx1anhila5yf.public.blob.vercel-storage.com/portals-nobk-15-quaOQafIhIzZzE0wqCDnFmBFB8A1c1.png\",\"type\":\"image\",\"alt\":\"Twilight Passages\"},\"year\":\"2023\",\"category\":\"Portals\",\"details\":{\"Medium\":\"Dye and pigment on linen\",\"Dimensions\":\"28 × 18 inches\"},\"createdAt\":\"2023-04-12T00:00:00.000Z\",\"updatedAt\":\"2023-04-12T00:00:00.000Z\"},{\"id\":\"portal-13\",\"title\":\"Crystalline Form\",\"slug\":\"crystalline-form\",\"description\":\"A sculptural piece that blurs the boundary between natural and artificial materiality. The vibrant turquoise blue form, veined with intricate black patterns, resembles both a precious mineral and an otherworldly artifact. Its glossy surface captures and refracts light, creating an interplay between transparency and opacity. This work explores themes of geological time, transformation, and the uncanny valley between organic growth and artistic intervention.\",\"media\":{\"id\":\"portal-media-13\",\"url\":\"https://hebbkx1anhila5yf.public.blob.vercel-storage.com/portals-nobk-04-lynnwPkegPaOzVtmxJjamPk6lBcnlW.png\",\"type\":\"image\",\"alt\":\"Crystalline Form\"},\"year\":\"2023\",\"category\":\"Portals\",\"details\":{\"Medium\":\"Resin, pigment, and mixed media\",\"Dimensions\":\"12 × 8 × 6 inches\"},\"createdAt\":\"2023-04-13T00:00:00.000Z\",\"updatedAt\":\"2023-04-13T00:00:00.000Z\"},{\"id\":\"portal-14\",\"title\":\"Aquatic Topography\",\"slug\":\"aquatic-topography\",\"description\":\"A sculptural relief piece in deep blue that captures the undulating patterns of water in three dimensions. The work transforms fluid movement into a solid form, freezing a moment of wave motion into a tactile landscape that invites both visual and physical exploration. The monochromatic blue surface creates a meditative quality, while the rhythmic ripples evoke the constant motion of oceanic currents and tidal patterns.\",\"media\":{\"id\":\"portal-media-14\",\"url\":\"https://hebbkx1anhila5yf.public.blob.vercel-storage.com/watersculpture-wooden-portals-nsjMsc37a7Dbzjfp10IO9D0TUxLfD8.png\",\"type\":\"image\",\"alt\":\"Aquatic Topography\"},\"year\":\"2023\",\"category\":\"Portals\",\"details\":{\"Medium\":\"Molded resin with pigment\",\"Dimensions\":\"36 × 36 × 4 inches\"},\"createdAt\":\"2023-04-14T00:00:00.000Z\",\"updatedAt\":\"2023-04-14T00:00:00.000Z\"},{\"id\":\"portal-15\",\"title\":\"Verdant Passage\",\"slug\":\"verdant-passage\",\"description\":\"A textile artwork featuring flowing gradients of green, blue, and purple on a delicate fabric. The piece creates a sense of movement through its organic patterns and color transitions, suggesting a journey through natural landscapes. The draped, undulating form of the fabric adds a dimensional quality that transforms the flat image into a sculptural presence, inviting viewers to imagine stepping through this portal into a lush, vibrant environment.\",\"media\":{\"id\":\"portal-media-15\",\"url\":\"https://hebbkx1anhila5yf.public.blob.vercel-storage.com/portals-nobk-10-v2nzvFIBwKwunrWYO0wdEBvm1qBncj.png\",\"type\":\"image\",\"alt\":\"Verdant Passage\"},\"year\":\"2023\",\"category\":\"Portals\",\"details\":{\"Medium\":\"Hand-dyed silk\",\"Dimensions\":\"24 × 24 inches\"},\"createdAt\":\"2023-04-15T00:00:00.000Z\",\"updatedAt\":\"2023-04-15T00:00:00.000Z\"},{\"id\":\"portal-16\",\"title\":\"Ethereal Veil\",\"slug\":\"ethereal-veil\",\"description\":\"A sculptural fabric installation featuring a large, draped translucent material with subtle photographic imagery visible through its surface. The piece stands tall with elegant folds that create a sense of movement and presence. Soft lavender, beige, and gray tones blend together in a dreamlike composition that shifts as light passes through the material. This work explores themes of memory, perception, and the ephemeral nature of experience through its material qualities and ghostly imagery.\",\"media\":{\"id\":\"portal-media-16\",\"url\":\"https://hebbkx1anhila5yf.public.blob.vercel-storage.com/portals-nobk-08-ygZ1nGbBGVG8PQpbUNm8DpZhcGiIE9.png\",\"type\":\"image\",\"alt\":\"Ethereal Veil\"},\"year\":\"2023\",\"category\":\"Portals\",\"details\":{\"Medium\":\"Photographic transfer on silk organza\",\"Dimensions\":\"72 × 48 × 24 inches\"},\"createdAt\":\"2023-04-16T00:00:00.000Z\",\"updatedAt\":\"2023-04-16T00:00:00.000Z\"},{\"id\":\"cyber-01\",\"title\":\"Submerged Light\",\"slug\":\"submerged-light\",\"description\":\"An ethereal portrait exploring the boundary between physical and digital existence. The figure, partially submerged with flowing orange hair, is illuminated by an otherworldly light that creates a dreamlike atmosphere, suggesting transformation and rebirth in a post-human context.\",\"media\":{\"id\":\"cyber-media-01\",\"url\":\"https://hebbkx1anhila5yf.public.blob.vercel-storage.com/cybergirl-01-2mN0Bw1UD1xF0jDHBmOF9WwQbOQjhH.png\",\"type\":\"image\",\"alt\":\"Submerged Light\"},\"year\":\"2023\",\"category\":\"Cybergirl\",\"details\":{\"Medium\":\"Mixed media photography\",\"Dimensions\":\"2400 × 3200 px\"},\"createdAt\":\"2023-05-01T00:00:00.000Z\",\"updatedAt\":\"2023-05-01T00:00:00.000Z\"},{\"id\":\"cyber-02\",\"title\":\"Blue Transition\",\"slug\":\"blue-transition\",\"description\":\"A portrait exploring digital identity through the metaphor of physical transformation. The figure with blue-tinted and orange hair presses against a transparent barrier, representing the interface between physical and virtual worlds. The bright central light creates a sense of transcendence and digital awakening.\",\"media\":{\"id\":\"cyber-media-02\",\"url\":\"https://hebbkx1anhila5yf.public.blob.vercel-storage.com/cybergirl-05-sx71s6Bf5cG25y1B3m0D0QWsIFsURz.png\",\"type\":\"image\",\"alt\":\"Blue Transition\"},\"year\":\"2023\",\"category\":\"Cybergirl\",\"details\":{\"Medium\":\"Digital photography with post-processing\",\"Dimensions\":\"2000 × 3000 px\"},\"createdAt\":\"2023-05-02T00:00:00.000Z\",\"updatedAt\":\"2023-05-02T00:00:00.000Z\"},{\"id\":\"cyber-03\",\"title\":\"Digital Persona\",\"slug\":\"digital-persona\",\"description\":\"A striking portrait bathed in electric blue light, exploring themes of digital identity and virtual personas. The subject's intense gaze and sleek bob haircut are rendered in monochromatic blue tones, while the word 'aggressive' appears as a three-dimensional typography element below, suggesting the performative nature of online identities and the tension between human emotion and digital expression.\",\"media\":{\"id\":\"cyber-media-03\",\"url\":\"https://hebbkx1anhila5yf.public.blob.vercel-storage.com/character-02-Os7t5Pc7rcGemFxJVv9mA6mXzwYefz.png\",\"type\":\"image\",\"alt\":\"Digital Persona\"},\"year\":\"2023\",\"category\":\"Cybergirl\",\"details\":{\"Medium\":\"Digital art with 3D typography\",\"Dimensions\":\"2400 × 3000 px\"},\"createdAt\":\"2023-05-03T00:00:00.000Z\",\"updatedAt\":\"2023-05-03T00:00:00.000Z\"},{\"id\":\"film-01\",\"title\":\"Slide Projector\",\"slug\":\"slide-projector\",\"description\":\"A meditative exploration of analog technology and memory through the rhythmic mechanics of a slide projector. The film captures the hypnotic quality of the device's movement and sound, creating a nostalgic reflection on how we preserve and present visual memories.\",\"media\":{\"id\":\"film-media-01\",\"url\":\"https://hebbkx1anhila5yf.public.blob.vercel-storage.com/Slide%20Projector_2011-mwN362X1OTLdBhcSnlFutqz2nFZ0Yh.mp4\",\"type\":\"video\",\"alt\":\"Slide Projector\",\"thumbnail\":\"https://hebbkx1anhila5yf.public.blob.vercel-storage.com/slideprojector-image-eWrVENMAnz5jyFhFdv5f6tZVPjKSM7.png\"},\"year\":\"2011\",\"category\":\"Film\",\"details\":{\"Medium\":\"Digital video\",\"Duration\":\"3:24\",\"Format\":\"MP4\"},\"createdAt\":\"2011-06-01T00:00:00.000Z\",\"updatedAt\":\"2023-05-10T00:00:00.000Z\"}]}]}]]}]\n"])</script></body></html>
