: "A portrait transferred onto wood, where the natural grain becomes part of the composition. The figure wears a dark crown atop vibrant orange-red hair, creating a striking contrast against the warm tones of the wood. This piece explores the intersection of traditional portraiture and organic materials.", "year": "2023", "category": "Characters", "details": {"Medium": "Photographic transfer on wood", "Dimensions": "18 \u00d7 24 inches"}, "mediaType": "image", "mediaUrl": "assets/images/character-05.png-PZQTTGovvhPJ39gAQxzej616kMRx7R.jpeg", "poster": ""}, {"title": "Window Fronds", "slug": "window-fronds", "description": "A contemplative study of plant life viewed through architectural framing, exploring the relationship between interior and exterior spaces.", "year": "2023", "category": "Play on Space", "details": {"Medium": "Photography", "Dimensions": "2400 \u00d7 2400 px"}, "mediaType": "image", "mediaUrl": "assets/images/playonshape_03-aq99Lq5Y4RpeX7WQHIQbRizZJsOeIs.png", "poster": ""}, {"title": "Book Sequence", "slug": "book-sequence", "description": "A cinematic exploration of knowledge transmission through sequential frames showing hands interacting with geometric diagrams in a book.", "year": "2023", "category": "Play on Space", "details": {"Medium": "Film photography", "Dimensions": "1600 \u00d7 2800 px"}, "mediaType": "image", "mediaUrl": "assets/images/playonshape_08-IPQg7ipJKXqSy8JGFbOf1TNYXAlRsl.png", "poster": ""}, {"title": "Portrait Frames", "slug": "portrait-frames", "description": "A meditation on identity and time through sequential film frames of a face, creating a rhythmic visual experience that blurs the boundary between still and moving image.", "year": "2023", "category": "Play on Space", "details": {"Medium": "16mm film", "Dimensions": "1600 \u00d7 2800 px"}, "mediaType": "image", "mediaUrl": "assets/images/playonshape_06-X8IrmmvjJkeK007dcJFK7FM2QrAT6v.png", "poster": ""}, {"title": "Vermillion Presence", "slug": "vermillion-presence", "description": "A bold exploration of absence and presence through a faceless, draped figure rendered in vivid red against a warm orange environment. The figure stands as a silent sentinel among palm trees and classical architectural elements, challenging perceptions of body, space, and identity through its striking monochromatic treatment and environmental juxtaposition.", "year": "2023", "category": "Play on Space", "details": {"Medium": "Digital photography with color manipulation", "Dimensions": "2000 \u00d7 3000 px"}, "mediaType": "image", "mediaUrl": "assets/images/playonspace-03-7YlWr7zWoxJ1DfRKxGH6goEUhQSIct.png", "poster": ""}, {"title": "Chromatic Flow", "slug": "chromatic-flow", "description": "A vibrant abstract composition featuring fluid, swirling patterns in orange, yellow, turquoise, and white. The piece captures a sense of dynamic movement through its organic forms and bold color transitions. The deckled edges of the paper add a tactile quality to this exploration of color interaction and visual rhythm, suggesting both natural phenomena like water currents and the more ephemeral flow of emotions or energy.", "year": "2023", "category": "Play on Space", "details": {"Medium": "Fluid acrylic on handmade paper", "Dimensions": "18 \u00d7 24 inches"}, "mediaType": "image", "mediaUrl": "assets/images/playonshape_18-X3rrZAiAY858IwKncGppNuDHVEZfh9.png", "poster": ""}, {"title": "Translucent Prisms", "slug": "translucent-prisms", "description": "A diptych photographic study of colorful translucent objects arranged against a white background. The vibrant orange, blue, purple, and amber forms create a play of light, color, and transparency as they overlap and interact. The composition explores how light passes through these geometric forms, creating new colors and shapes at their intersections. This piece invites contemplation of perception, materiality, and the transformative nature of light.", "year": "2023", "category": "Play on Space", "details": {"Medium": "Digital photography", "Dimensions": "24 \u00d7 36 inches"}, "mediaType": "image", "mediaUrl": "assets/images/playonshape_12-mrt7B9qGy3gK36lzk9IxzcWYDEWVGH.png", "poster": ""}, {"title": "Landscape Memory", "slug": "landscape-memory", "description": "A textural exploration of landscape through crumpled, dyed fabric. The piece creates a topographical memory of a path through green hills and blue sky, inviting viewers to traverse an imagined terrain.", "year": "2023", "category": "Portals", "details": {"Medium": "Dyed and manipulated fabric", "Dimensions": "36 \u00d7 48 inches"}, "mediaType": "image", "mediaUrl": "assets/images/portals-nobk-02-wEkA4CYIRqbEriClNPcwJx8UT6AdhR.png", "poster": ""}, {"title": "Tactile Flow", "slug": "tactile-flow", "description": "A sculptural fabric piece exploring the materiality of memory. Subtle blue-green tones and organic textures create a sense of movement and flow, suggesting water or geological formations frozen in time.", "year": "2023", "category": "Portals", "details": {"Medium": "Dyed fabric with mixed media", "Dimensions": "24 \u00d7 40 inches"}, "mediaType": "image", "mediaUrl": "assets/images/portals-nobk-01-fJPkmohEVsSJPVcQ80WNmWTbGwxbzD.png", "poster": ""}, {"title": "Forest Canopy", "slug": "forest-canopy", "description": "A translucent fabric piece capturing the experience of looking up through a forest canopy. The layered, crumpled surface creates depth and dimensionality, while the green tones evoke the filtered light of a dense forest.", "year": "2023", "category": "Portals", "details": {"Medium": "Silk with natural dyes", "Dimensions": "40 \u00d7 50 inches"}, "mediaType": "image", "mediaUrl": "assets/images/portals-nobk-03-fHoJ3E9NbdgDA4ckeAujV8B7VbkYEg.png", "poster": ""}, {"title": "Oceanic Veil", "slug": "oceanic-veil", "description": "A suspended fabric piece that explores the boundary between air and water. The translucent material with its blue gradient creates a sense of submersion, while the folds and textures suggest currents and tides.", "year": "2023", "category": "Portals", "details": {"Medium": "Hand-dyed silk organza", "Dimensions": "30 \u00d7 45 inches"}, "mediaType": "image", "mediaUrl": "assets/images/portals-nobk-05-lF1LZTsvObsnYz95QnzqMTNFM7DA4n.png", "poster": ""}, {"title": "Horizon Lines", "slug": "horizon-lines", "description": "A textile piece that abstracts the experience of landscape into horizontal bands of color. The crumpled surface creates a sense of depth and movement, while the color palette evokes earth, water, and sky.", "year": "2023", "category": "Portals", "details": {"Medium": "Dyed and treated fabric", "Dimensions": "36 \u00d7 36 inches"}, "mediaType": "image", "mediaUrl": "assets/images/portals-nobk-06-wYJpkjFd5DbDlbgYUCCzmNeSGk2CJq.png", "poster": ""}, {"title": "Memory Scan", "slug": "memory-scan", "description": "A vertical textile piece that resembles a digital scan or glitch of a landscape. The stretched and compressed imagery creates a sense of time passing, while the subtle color palette suggests a fading memory.", "year": "2023", "category": "Portals", "details": {"Medium": "Digital print on fabric", "Dimensions": "24 \u00d7 36 inches"}, "mediaType": "image", "mediaUrl": "assets/images/portals-nobk-09-8OFwDi6Ys12o8MZHICj5NHoDXDBcSG.png", "poster": ""}, {"title": "Desert Layers", "slug": "desert-layers", "description": "A digital exploration of dimensional space using a desert landscape as canvas. Multiple rectangular frames create a portal-like effect, inviting the viewer to step through layers of reality. The vibrant blue sky contrasts with the soft beige sand dunes and sparse vegetation, suggesting an oasis of possibility within the arid environment.", "year": "2023", "category": "Portals", "details": {"Medium": "Digital composition", "Dimensions": "2400 \u00d7 3200 px"}, "mediaType": "image", "mediaUrl": "assets/images/Portal-01-RTHEzaCLn0fxcQgtUTqTQEd7HRjvrT.png", "poster": ""}, {"title": "Mountain Echo", "slug": "mountain-echo", "description": "A dimensional study of a mountain landscape, where reality appears to fold in on itself through cascading rectangular frames. The golden-hued terrain and bright blue sky create a sense of expansiveness, while the layered composition suggests multiple parallel existences or the echoing of a single moment across time.", "year": "2023", "category": "Portals", "details": {"Medium": "Digital composition", "Dimensions": "2400 \u00d7 3200 px"}, "mediaType": "image", "mediaUrl": "assets/images/Portal-02-RXte0zViPp8ZW5wav65PdQZplRpY3Z.png", "poster": ""}, {"title": "Crimson Terrain", "slug": "crimson-terrain", "description": "An otherworldly landscape rendered entirely in vivid red hues, featuring a geometric intervention in an undulating desert terrain. The rectangular form appears to both emerge from and sink into the environment, creating a portal-like disruption in the natural topography. This piece explores themes of artificial intrusion in natural spaces and the uncanny valley between digital and physical realms.", "year": "2023", "category": "Portals", "details": {"Medium": "Digital composition with color manipulation", "Dimensions": "2400 \u00d7 3600 px"}, "mediaType": "image", "mediaUrl": "assets/images/portal-05-LA3CvkBJaL5Qc76cK5uVTnUlChp0W6.png", "poster": ""}, {"title": "Shoreline Memory", "slug": "shoreline-memory", "description": "A delicate translucent fabric artwork capturing the essence of a coastal landscape. The crumpled, organic form creates a three-dimensional topography where the upper portion fades to ethereal white while the lower section reveals rich detail of vegetation, stones, and aquatic elements. This piece explores the fragility of environmental memory and the layered experience of natural spaces through its materiality and photographic transfer technique.", "year": "2023", "category": "Portals", "details": {"Medium": "Photographic transfer on handmade paper", "Dimensions": "30 \u00d7 16 inches"}, "mediaType": "image", "mediaUrl": "assets/images/portals-nobk-07-3JxGwDR3q5auL6idzSBNpGizYflQs4.png", "poster": ""}, {"title": "Wind Through Grass", "slug": "wind-through-grass", "description": "A textile artwork capturing the ephemeral quality of movement through a landscape. The diagonal streaks of green, yellow, and deep purple create a sense of motion, as if the viewer is passing through a field at speed or witnessing grass bending in a strong breeze. The intentional blurring technique transforms a static natural scene into a dynamic experience, exploring the intersection of time, movement, and perception.", "year": "2023", "category": "Portals", "details": {"Medium": "Dye on silk", "Dimensions": "24 \u00d7 16 inches"}, "mediaType": "image", "mediaUrl": "assets/images/portals-nobk-11-c6vjWvbMuKPQzW4qoS0d6XUMASicJ2.png", "poster": ""}, {"title": "Twilight Passages", "slug": "twilight-passages", "description": "A textile artwork with a deep indigo background illuminated by vertical columns of light. The glowing orange and yellow elements emerge from the darkness like doorways or passages to another dimension. The piece evokes the liminal space between day and night, or perhaps between different states of consciousness. The rich purple tones and luminous accents create a meditative, almost mystical atmosphere that invites contemplation of thresholds and transitions.", "year": "2023", "category": "Portals", "details": {"Medium": "Dye and pigment on linen", "Dimensions": "28 \u00d7 18 inches"}, "mediaType": "image", "mediaUrl": "assets/images/portals-nobk-15-quaOQafIhIzZzE0wqCDnFmBFB8A1c1.png", "poster": ""}, {"title": "Crystalline Form", "slug": "crystalline-form", "description": "A sculptural piece that blurs the boundary between natural and artificial materiality. The vibrant turquoise blue form, veined with intricate black patterns, resembles both a precious mineral and an otherworldly artifact. Its glossy surface captures and refracts light, creating an interplay between transparency and opacity. This work explores themes of geological time, transformation, and the uncanny valley between organic growth and artistic intervention.", "year": "2023", "category": "Portals", "details": {"Medium": "Resin, pigment, and mixed media", "Dimensions": "12 \u00d7 8 \u00d7 6 inches"}, "mediaType": "image", "mediaUrl": "assets/images/portals-nobk-04-lynnwPkegPaOzVtmxJjamPk6lBcnlW.png", "poster": ""}, {"title": "Aquatic Topography", "slug": "aquatic-topography", "description": "A sculptural relief piece in deep blue that captures the undulating patterns of water in three dimensions. The work transforms fluid movement into a solid form, freezing a moment of wave motion into a tactile landscape that invites both visual and physical exploration. The monochromatic blue surface creates a meditative quality, while the rhythmic ripples evoke the constant motion of oceanic currents and tidal patterns.", "year": "2023", "category": "Portals", "details": {"Medium": "Molded resin with pigment", "Dimensions": "36 \u00d7 36 \u00d7 4 inches"}, "mediaType": "image", "mediaUrl": "assets/images/watersculpture-wooden-portals-nsjMsc37a7Dbzjfp10IO9D0TUxLfD8.png", "poster": ""}, {"title": "Verdant Passage", "slug": "verdant-passage", "description": "A textile artwork featuring flowing gradients of green, blue, and purple on a delicate fabric. The piece creates a sense of movement through its organic patterns and color transitions, suggesting a journey through natural landscapes. The draped, undulating form of the fabric adds a dimensional quality that transforms the flat image into a sculptural presence, inviting viewers to imagine stepping through this portal into a lush, vibrant environment.", "year": "2023", "category": "Portals", "details": {"Medium": "Hand-dyed silk", "Dimensions": "24 \u00d7 24 inches"}, "mediaType": "image", "mediaUrl": "assets/images/portals-nobk-10-v2nzvFIBwKwunrWYO0wdEBvm1qBncj.png", "poster": ""}, {"title": "Ethereal Veil", "slug": "ethereal-veil", "description": "A sculptural fabric installation featuring a large, draped translucent material with subtle photographic imagery visible through its surface. The piece stands tall with elegant folds that create a sense of movement and presence. Soft lavender, beige, and gray tones blend together in a dreamlike composition that shifts as light passes through the material. This work explores themes of memory, perception, and the ephemeral nature of experience through its material qualities and ghostly imagery.", "year": "2023", "category": "Portals", "details": {"Medium": "Photographic transfer on silk organza", "Dimensions": "72 \u00d7 48 \u00d7 24 inches"}, "mediaType": "image", "mediaUrl": "assets/images/portals-nobk-08-ygZ1nGbBGVG8PQpbUNm8DpZhcGiIE9.png", "poster": ""}, {"title": "Submerged Light", "slug": "submerged-light", "description": "An ethereal portrait exploring the boundary between physical and digital existence. The figure, partially submerged with flowing orange hair, is illuminated by an otherworldly light that creates a dreamlike atmosphere, suggesting transformation and rebirth in a post-human context.", "year": "2023", "category": "Cybergirl", "details": {"Medium": "Mixed media photography", "Dimensions": "2400 \u00d7 3200 px"}, "mediaType": "image", "mediaUrl": "assets/images/cybergirl-01-2mN0Bw1UD1xF0jDHBmOF9WwQbOQjhH.png", "poster": ""}, {"title": "Blue Transition", "slug": "blue-transition", "description": "A portrait exploring digital identity through the metaphor of physical transformation. The figure with blue-tinted and orange hair presses against a transparent barrier, representing the interface between physical and virtual worlds. The bright central light creates a sense of transcendence and digital awakening.", "year": "2023", "category": "Cybergirl", "details": {"Medium": "Digital photography with post-processing", "Dimensions": "2000 \u00d7 3000 px"}, "mediaType": "image", "mediaUrl": "assets/images/cybergirl-05-sx71s6Bf5cG25y1B3m0D0QWsIFsURz.png", "poster": ""}, {"title": "Digital Persona", "slug": "digital-persona", "description": "A striking portrait bathed in electric blue light, exploring themes of digital identity and virtual personas. The subject's intense gaze and sleek bob haircut are rendered in monochromatic blue tones, while the word 'aggressive' appears as a three-dimensional typography element below, suggesting the performative nature of online identities and the tension between human emotion and digital expression.", "year": "2023", "category": "Cybergirl", "details": {"Medium": "Digital art with 3D typography", "Dimensions": "2400 \u00d7 3000 px"}, "mediaType": "image", "mediaUrl": "assets/images/character-02-Os7t5Pc7rcGemFxJVv9mA6mXzwYefz.png", "poster": ""}, {"title": "Slide Projector", "slug": "slide-projector", "description": "A meditative exploration of analog technology and memory through the rhythmic mechanics of a slide projector. The film captures the hypnotic quality of the device's movement and sound, creating a nostalgic reflection on how we preserve and present visual memories.", "year": "2011", "category": "Film", "details": {"Medium": "Digital video", "Duration": "3:24", "Format": "MP4"}, "mediaType": "video", "mediaUrl": "assets/videos/slide-projector.mp4", "poster": "assets/images/slideprojector-image-eWrVENMAnz5jyFhFdv5f6tZVPjKSM7.png"}];
      const bySlug = Object.fromEntries(ARTWORKS.map((a) => [a.slug, a]));

      const buttons = document.querySelectorAll('.filter-btn');
      const cards = document.querySelectorAll('.artwork');
      const fixedHeader = document.querySelector('header.fixed');
      const fixedFilters = document.querySelector('.fixed.top-20');
      const gallerySection = document.querySelector('.pt-32');

      function syncGalleryOffset() {
        const headerH = fixedHeader ? fixedHeader.offsetHeight : 0;
        const filtersH = fixedFilters ? fixedFilters.offsetHeight : 0;
        const safeGap = 18;
        if (gallerySection) {
          gallerySection.style.paddingTop = `${headerH + filtersH + safeGap}px`;
        }
      }
      function setActive(btn) {
        buttons.forEach((b) => b.classList.remove('active-filter'));
        btn.classList.add('active-filter');
      }
      function apply(filter) {
        cards.forEach((card) => {
          card.style.display = filter === 'all' || card.dataset.category === filter ? '' : 'none';
        });
      }
      buttons.forEach((btn) => {
        btn.addEventListener('click', () => {
          setActive(btn);
          apply(btn.dataset.filter);
          syncGalleryOffset();
        });
      });
      apply('all');
      syncGalleryOffset();
      window.addEventListener('resize', syncGalleryOffset);
      window.addEventListener('load', syncGalleryOffset);

      const overlay = document.getElementById('modal-overlay');
      const body = document.getElementById('modal-body');
      const closeBtn = document.getElementById('modal-close');

      function detailsHtml(details) {
        return Object.entries(details || {}).map(([k,v]) => `<li><strong>${k}:</strong> ${v}</li>`).join('');
      }

      function openArtwork(slug, push=true) {
        const a = bySlug[slug];
        if (!a) return;
        const media = a.mediaType === 'video'
          ? `<video controls playsinline class="detail-media" poster="${a.poster || ''}"><source src="${a.mediaUrl}" type="video/mp4" /></video>`
          : `<img src="${a.mediaUrl}" alt="${a.title}" class="detail-media" />`;
        body.innerHTML = `
          <section class="detail-grid">
            <div class="detail-image-wrap">${media}</div>
            <article class="detail-meta">
              <p class="detail-category">${a.category}</p>
              <h1>${a.title}</h1>
              <p class="detail-year">${a.year}</p>
              <p>${a.description}</p>
              <ul>${detailsHtml(a.details)}</ul>
            </article>
          </section>`;
        overlay.hidden = false;
        document.body.classList.add('modal-open');
        if (push) history.pushState({ modal: 'artwork', slug }, '', `./artwork/${slug}/`);
      }

      function closeModal(pop=true) {
        overlay.hidden = true;
        body.innerHTML = '';
        document.body.classList.remove('modal-open');
        if (pop) history.pushState({ modal: null }, '', './');
      }

      document.querySelectorAll('.artwork-link').forEach((el) => {
        el.addEventListener('click', (e) => {
          e.preventDefault();
          openArtwork(el.dataset.slug);
        });
      });

      closeBtn.addEventListener('click', () => closeModal());
      overlay.addEventListener('click', (e) => { if (e.target === overlay) closeModal(); });

      window.addEventListener('popstate', () => {
        const p = location.pathname.replace(/\/+$/, '');
        const m = p.match(/\/artwork\/([^\/]+)$/);
        if (m) return openArtwork(m[1], false);
        closeModal(false);
      });

      const p = location.pathname.replace(/\/+$/, '');
      const m = p.match(/\/artwork\/([^\/]+)$/);
      if (m) openArtwork(m[1], false);
    </script>
